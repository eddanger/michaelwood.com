<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GarageBot - Admin Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 40px;
      border: 1px solid #333;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .bot-icon {
      font-size: 64px;
      margin-bottom: 20px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    h1 {
      font-size: 24px;
      color: #fff;
      margin-bottom: 10px;
    }
    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 30px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: #0f0f0f;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      margin-bottom: 15px;
      outline: none;
    }
    input[type="password"]:focus {
      border-color: #4a9eff;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #2d5a27;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #3d7a37;
    }
    .error {
      background: #5a2727;
      color: #ff7f7f;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 14px;
    }
    .back-link {
      display: block;
      margin-top: 20px;
      color: #888;
      text-decoration: none;
      font-size: 13px;
    }
    .back-link:hover {
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="bot-icon">🤖</div>
    <h1>GarageBot</h1>
    <div class="subtitle">Admin Access</div>
    
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    
    <form method="POST" action="//login">
      <input 
        type="password" 
        name="password" 
        placeholder="Enter admin password" 
        required
        autofocus
      >
      <button type="submit">Unlock</button>
    </form>
    
    <a href="//" class="back-link">← Back to Status</a>
  </div>
</body>
</html>
