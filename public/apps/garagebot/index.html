<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GarageBot - Status</title>
  <meta http-equiv="refresh" content="30">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    
    /* Dancing Robot */
    .robot-container {
      position: fixed;
      bottom: 80px;
      right: 20px;
      z-index: 100;
      cursor: pointer;
    }
    .robot {
      font-size: 64px;
      animation: dance 1s infinite;
      filter: drop-shadow(0 0 10px #4a9eff);
      transition: transform 0.3s;
    }
    .robot:hover {
      transform: scale(1.2);
    }
    @keyframes dance {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-10px) rotate(-5deg); }
      50% { transform: translateY(0) rotate(0deg); }
      75% { transform: translateY(-10px) rotate(5deg); }
    }
    .robot.jumping {
      animation: jump 0.5s ease-out;
    }
    @keyframes jump {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-50px) scale(1.1); }
    }
    
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 20px;
      border-bottom: 2px solid #333;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .bot-icon {
      font-size: 48px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .header h1 {
      font-size: 24px;
      color: #fff;
    }
    .header .subtitle {
      font-size: 14px;
      color: #888;
    }
    .status-badge {
      margin-left: auto;
      padding: 8px 16px;
      border-radius: 20px;
      background: #2d5a27;
      color: #7fff7f;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
    }
    .status-badge.idle {
      background: #5a5a27;
      color: #ffff7f;
    }
    .status-badge.busy {
      background: #5a2727;
      color: #ff7f7f;
    }
    .container {
      flex: 1;
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
    }
    .card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #333;
    }
    .card h2 {
      font-size: 14px;
      color: #7fafff;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .service-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .service {
      padding: 8px 16px;
      background: #0f0f0f;
      border-radius: 20px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .service.online {
      border: 1px solid #2d5a27;
      color: #7fff7f;
    }
    .service.offline {
      border: 1px solid #5a2727;
      color: #ff7f7f;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #7fff7f;
      animation: blink 2s infinite;
    }
    .service.offline .dot {
      background: #ff7f7f;
      animation: none;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #555;
    }
    .footer .update-time {
      color: #888;
    }
    .back-link {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #333;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      z-index: 101;
    }
    .back-link:hover {
      background: #555;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }
    .stat {
      text-align: center;
      padding: 15px;
      background: #0f0f0f;
      border-radius: 8px;
    }
    .stat-value {
      font-size: 28px;
      font-weight: bold;
      color: #fff;
    }
    .stat-label {
      font-size: 10px;
      color: #888;
      text-transform: uppercase;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="bot-icon">🤖</div>
    <div>
      <h1>GarageBot</h1>
      <div class="subtitle">AI Assistant Status</div>
    </div>
    <div class="status-badge" id="status">Online</div>
  </div>

  <div class="container">
    <div class="card">
      <h2>Connected Services</h2>
      <div class="service-list">
        <div class="service online">
          <span class="dot"></span>
          <span>Gmail</span>
        </div>
        <div class="service online">
          <span class="dot"></span>
          <span>Calendar</span>
        </div>
        <div class="service online">
          <span class="dot"></span>
          <span>Memory</span>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>System Status</h2>
      <div class="stats">
        <div class="stat">
          <div class="stat-value">🟢</div>
          <div class="stat-label">Status</div>
        </div>
        <div class="stat">
          <div class="stat-value">🚗</div>
          <div class="stat-label">Garage</div>
        </div>
        <div class="stat">
          <div class="stat-value">v1</div>
          <div class="stat-label">Version</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Dancing Robot -->
  <div class="robot-container" onclick="jumpRobot()">
    <div class="robot" id="dancer">🤖</div>
  </div>

  <a href="../" class="back-link">← Apps</a>

  <div class="footer">
    <span class="update-time">Last updated: <span id="last-updated">2026-01-28 15:28 PST</span></span>
    <br>
    Auto-refreshes every 30s
  </div>

  <script>
    // Update timestamp
    function updateTimestamp() {
      const now = new Date();
      const pst = now.toLocaleString('en-US', {
        timeZone: 'America/Vancouver',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      });
      document.getElementById('last-updated').textContent = pst + ' PST';
    }
    updateTimestamp();
    setInterval(updateTimestamp, 60000);

    // Dancing robot interactions
    function jumpRobot() {
      const dancer = document.getElementById('dancer');
      dancer.classList.add('jumping');
      setTimeout(() => dancer.classList.remove('jumping'), 500);
      
      // Random robot emoji
      const robots = ['🤖', '👾', '🦾', '🚀', '⚡'];
      dancer.textContent = robots[Math.floor(Math.random() * robots.length)];
      setTimeout(() => dancer.textContent = '🤖', 1000);
    }

    // Occasional dance change
    setInterval(() => {
      const dancer = document.getElementById('dancer');
      const dances = ['dance', 'wiggle', 'bounce'];
      // Could add different animation classes here
    }, 5000);

    console.log('GarageBot dashboard loaded 🤖');
  </script>
</body>
</html>
